name: ShellCheck

on:
  push:
    paths: ["scripts/**", ".github/workflows/shellcheck.yml"]
  pull_request:
    paths: ["scripts/**", ".github/workflows/shellcheck.yml"]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          # info-level SC1091 (can't statically follow `source rates.env`) is
          # expected — the scripts carry `# shellcheck source=` directives.
          # Fail the build only on real problems.
          severity: warning
